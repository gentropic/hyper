<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hyper — GCU storage inspector</title>
  <script>
    // Switchboard theme bootstrap. Runs before <body> renders so the
    // first paint is already on the correct surface — no FOUC. Mirrors
    // OS preference; persistence (localStorage) deferred.
    (function () {
      var mq = window.matchMedia('(prefers-color-scheme: dark)');
      // Switchboard convention: dark sets attribute, light leaves it absent.
      var apply = function (dark) {
        if (dark) document.documentElement.setAttribute('data-theme', 'dark');
        else document.documentElement.removeAttribute('data-theme');
      };
      apply(mq.matches);
      mq.addEventListener('change', function (e) { apply(e.matches); });
    })();
  </script>
  <style>/* hyper — uses Switchboard 1.0 tokens.
 * Tokens here mirror Switchboard SPEC §2-4 (surfaces / accents / other).
 * Component CSS reads --sw-* directly (no semantic indirection — hyper is
 * small enough to skip the --au-* style re-skinnability layer that
 * auditable uses).
 *
 * Light is :root (equipment gray); dark is [data-theme="dark"] on <html>.
 * The theme attribute is set by main.js from prefers-color-scheme on boot.
 * Fonts fall back to system stacks (the woff2 binaries are not embedded;
 * Barlow / Space Mono load when the user has them installed locally).
 */

:root {
  /* Surfaces — equipment gray */
  --sw-bg-deep:     #C2C1BE;
  --sw-bg:          #D2D1CE;
  --sw-bg-raised:   #E4E3E1;
  --sw-bg-bright:   #EDECEB;
  --sw-text:        #232322;
  --sw-text-mid:    #504F4C;
  --sw-text-soft:   #7A7875;
  --sw-border:      #B3B1AD;
  --sw-border-soft: #C6C4C1;
  --sw-rule:        #A5A3A0;

  /* Accents — light */
  --sw-orange:      #B54E1A;  --sw-orange-soft: #E8D8CF;
  --sw-teal:        #1B6B72;  --sw-teal-soft:   #CEE2E4;
  --sw-green:       #3D7340;  --sw-green-soft:  #D2E4D4;
  --sw-amber:       #8E6518;  --sw-amber-soft:  #E4DCCC;
  --sw-red:         #A8312A;  --sw-red-soft:    #E8D6D4;
  --sw-indigo:      #4E5580;  --sw-indigo-soft: #D8D9E2;

  /* Other */
  --sw-radius:      3px;
  --sw-radius-lg:   4px;
  --sw-mono: 'Space Mono', 'JetBrains Mono', 'Consolas', ui-monospace, monospace;
  --sw-sans: 'Barlow', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;

  /* hyper-local: modal backdrop. Not a Switchboard token (modals aren't a
   * Switchboard component); the scrim is intentionally semi-transparent and
   * not bound to the accent system. */
  --hy-backdrop: rgba(20, 20, 20, 0.45);
}

[data-theme="dark"] {
  --sw-bg-deep:     #0E1012;
  --sw-bg:          #15171A;
  --sw-bg-raised:   #1D2024;
  --sw-bg-bright:   #25282D;
  --sw-text:        #DDDCDA;
  --sw-text-mid:    #9E9C98;
  --sw-text-soft:   #6E6C68;
  --sw-border:      #2F3338;
  --sw-border-soft: #24272B;
  --sw-rule:        #3A3E44;

  --sw-orange:      #D4672E;  --sw-orange-soft: #2E1F18;
  --sw-teal:        #3A9BA3;  --sw-teal-soft:   #16272A;
  --sw-green:       #5A9B5E;  --sw-green-soft:  #18261A;
  --sw-amber:       #C49540;  --sw-amber-soft:  #2A2316;
  --sw-red:         #D05048;  --sw-red-soft:    #2C1A18;
  --sw-indigo:      #7E86B8;  --sw-indigo-soft: #1E2030;

  --hy-backdrop: rgba(0, 0, 0, 0.7);
}

/* --- Resets + base --- */

* { box-sizing: border-box; }

body {
  margin: 0 auto;
  padding: 1.5rem 1.25rem;
  max-width: 800px;
  font-family: var(--sw-sans);
  font-size: 14.5px;
  line-height: 1.55;
  background: var(--sw-bg);
  color: var(--sw-text);
}

h1 {
  font-family: var(--sw-sans);
  font-size: 1.45rem;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin: 0 0 0.3rem;
  line-height: 1.2;
}

h2 {
  font-family: var(--sw-mono);
  font-size: 0.72rem;
  font-weight: 400;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--sw-text-soft);
  margin: 1.5rem 0 0.6rem;
}

/* --- Header --- */

.hyper-header { margin-bottom: 1.25rem; }
.hyper-summary {
  margin: 0;
  font-family: var(--sw-mono);
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  color: var(--sw-text-mid);
}
.hyper-summary .muted { color: var(--sw-text-soft); }
.hyper-summary .sep { color: var(--sw-text-soft); padding: 0 0.15rem; }

/* --- Tool row (panel) --- */

.hyper-tool {
  border: 1px solid var(--sw-border);
  border-radius: var(--sw-radius-lg);
  background: var(--sw-bg-raised);
  padding: 0.85rem 1rem;
  margin-bottom: 0.6rem;
}

.hyper-tool__head {
  display: flex;
  align-items: baseline;
  gap: 0.6rem;
  margin-bottom: 0.45rem;
}
.hyper-tool__name {
  font-family: var(--sw-mono);
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--sw-text);
}
.hyper-tool__version {
  font-family: var(--sw-mono);
  font-size: 0.78rem;
  color: var(--sw-text-soft);
}

/* "inferred" tag — Switchboard badge pattern, info (teal) variant. */
.hyper-tool__tag {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  background: var(--sw-teal-soft);
  color: var(--sw-teal);
  font-family: var(--sw-mono);
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 0.1rem 0.45rem;
  border-radius: var(--sw-radius);
}
.hyper-tool__tag::before {
  content: '';
  display: inline-block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: currentColor;
}

.hyper-bar-wrap {
  margin: 0.3rem 0 0.6rem;
}
.hyper-bar-wrap--placeholder {
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.hyper-bar {
  display: flex;
  height: 6px;
  background: var(--sw-bg-deep);
  border-radius: var(--sw-radius);
  overflow: hidden;
  margin-bottom: 0.25rem;
}
.hyper-bar__seg { height: 100%; }
.hyper-bar__seg--cache { background: var(--sw-text-soft); }
.hyper-bar__seg--ls    { background: var(--sw-text-mid); }

.hyper-bar-label {
  font-family: var(--sw-mono);
  font-size: 0.7rem;
  letter-spacing: 0.06em;
  color: var(--sw-text-soft);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
/* Compact "Compute" button styled to fit inline with the bar label */
.hyper-bar-label .hyper-btn {
  padding: 0.15rem 0.5rem;
  min-height: 0;
  font-size: 0.65rem;
  letter-spacing: 0.08em;
}

.hyper-tool__stats {
  display: flex;
  flex-wrap: wrap;
  gap: 0.2rem 1.5rem;
  font-family: var(--sw-mono);
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  color: var(--sw-text-soft);
  margin-bottom: 0.6rem;
}

.hyper-tool__actions,
.hyper-global-actions {
  display: flex;
  gap: 0.45rem;
  flex-wrap: wrap;
}

.hyper-global-actions { margin-top: 1.5rem; }

/* --- Buttons — Switchboard §6.2 --- */

.hyper-btn {
  font-family: var(--sw-mono);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  padding: 0.6rem 0.85rem;
  min-height: 32px;
  border: 1px solid var(--sw-border);
  border-radius: var(--sw-radius);
  background: transparent;
  color: var(--sw-text);
  cursor: pointer;
}
.hyper-btn:hover {
  border-color: var(--sw-orange);
  color: var(--sw-orange);
}
.hyper-btn:focus-visible {
  outline: 2px solid var(--sw-orange);
  outline-offset: 1px;
}

/* Danger variant — uses red (fault). Switchboard §3 reserves red for
 * faults; destructive actions are fault-class operations on user state. */
.hyper-btn--danger {
  border-color: var(--sw-red);
  color: var(--sw-red);
}
.hyper-btn--danger:hover {
  background: var(--sw-red);
  color: var(--sw-bg);
}
.hyper-btn--danger:focus-visible {
  outline-color: var(--sw-red);
}

.hyper-btn[disabled] {
  opacity: 0.4;
  cursor: not-allowed;
}
.hyper-btn[disabled]:hover {
  border-color: var(--sw-border);
  color: var(--sw-text);
  background: transparent;
}

/* --- Containers (gcu:img) --- */

.hyper-images { margin-top: 1.5rem; }
.hyper-images__runtime {
  font-family: var(--sw-mono);
  font-size: 0.7rem;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--sw-text-soft);
  margin: 1rem 0 0.5rem;
}

.hyper-image {
  border: 1px solid var(--sw-border);
  border-radius: var(--sw-radius-lg);
  background: var(--sw-bg-raised);
  padding: 0.85rem 1rem;
  margin-bottom: 0.6rem;
}

.hyper-image__head {
  display: flex;
  align-items: baseline;
  gap: 0.6rem;
  margin-bottom: 0.35rem;
}
.hyper-image__name {
  font-family: var(--sw-sans);
  font-size: 1rem;
  font-weight: 600;
  color: var(--sw-text);
}
.hyper-image__runtime {
  font-family: var(--sw-mono);
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  color: var(--sw-text-soft);
}

/* Isolation badge — indigo=selected for trusted (default, lower stakes),
 * amber=caution for strict (the sandboxed mode has constraints the user
 * should be aware of when reading the row). */
.hyper-image__iso {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  font-family: var(--sw-mono);
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 0.1rem 0.45rem;
  border-radius: var(--sw-radius);
}
.hyper-image__iso::before {
  content: '';
  display: inline-block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: currentColor;
}
.hyper-image__iso--trusted { background: var(--sw-indigo-soft); color: var(--sw-indigo); }
.hyper-image__iso--strict  { background: var(--sw-amber-soft);  color: var(--sw-amber);  }

.hyper-image__meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0.2rem 1.25rem;
  font-family: var(--sw-mono);
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  color: var(--sw-text-soft);
  margin-bottom: 0.6rem;
}
.hyper-image__scope { color: var(--sw-text-mid); }

/* --- Unattributed / Malformed --- */

.hyper-unattributed,
.hyper-malformed { margin-top: 1.5rem; color: var(--sw-text-mid); }
.hyper-unattributed p,
.hyper-malformed p {
  font-family: var(--sw-mono);
  font-size: 0.78rem;
  letter-spacing: 0.06em;
}
.hyper-malformed ul { margin: 0; padding-left: 1.25rem; }
.hyper-malformed li {
  font-family: var(--sw-mono);
  font-size: 0.8rem;
  color: var(--sw-text-mid);
}

.hyper-error {
  color: var(--sw-red);
  font-family: var(--sw-mono);
  font-size: 0.85rem;
  white-space: pre-wrap;
}

/* --- Modal dialogs ---
 * Switchboard has no canonical modal component. Built here using the panel
 * register (--sw-bg-raised body, 1px border, no shadow per §10) plus a scrim. */

.hyper-dialog {
  border: 1px solid var(--sw-border);
  border-radius: var(--sw-radius-lg);
  background: var(--sw-bg-raised);
  color: var(--sw-text);
  padding: 1.25rem;
  max-width: min(28rem, calc(100vw - 2rem));
  font-family: var(--sw-sans);
}
.hyper-dialog::backdrop {
  background: var(--hy-backdrop);
}
.hyper-dialog--danger { border-color: var(--sw-red); }

.hyper-dialog__title {
  font-family: var(--sw-sans);
  font-size: 1.2rem;
  font-weight: 600;
  margin: 0 0 0.5rem;
  color: var(--sw-text);
  /* override the global h2 mono-uppercase treatment */
  letter-spacing: 0;
  text-transform: none;
}
.hyper-dialog--danger .hyper-dialog__title { color: var(--sw-red); }

.hyper-dialog__body {
  margin: 0 0 0.85rem;
  color: var(--sw-text-mid);
  white-space: pre-wrap;
}
.hyper-dialog__prompt {
  font-family: var(--sw-mono);
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--sw-text-soft);
  margin: 0 0 0.35rem;
}
.hyper-dialog__input {
  display: block;
  width: 100%;
  padding: 0.45rem 0.6rem;
  font-family: var(--sw-mono);
  font-size: 0.9rem;
  border: 1px solid var(--sw-border);
  border-radius: var(--sw-radius);
  background: var(--sw-bg);
  color: var(--sw-text);
  margin-bottom: 1rem;
}
.hyper-dialog__input:focus {
  outline: none;
  border-color: var(--sw-orange);
  box-shadow: 0 0 0 3px var(--sw-orange-soft);
}
.hyper-dialog--danger .hyper-dialog__input:focus {
  border-color: var(--sw-red);
  box-shadow: 0 0 0 3px var(--sw-red-soft);
}

.hyper-dialog__actions {
  display: flex;
  justify-content: flex-end;
  gap: 0.45rem;
}

/* --- Show-details (per-tool) --- */

.hyper-tool__details {
  margin-top: 0.85rem;
  border-top: 1px dashed var(--sw-border-soft);
  padding-top: 0.6rem;
}
.hyper-tool__details summary {
  cursor: pointer;
  font-family: var(--sw-mono);
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--sw-text-soft);
  user-select: none;
}
.hyper-tool__details summary:hover { color: var(--sw-orange); }
.hyper-tool__details[open] summary { margin-bottom: 0.6rem; }

.hyper-detail-section { margin: 0.6rem 0 0.85rem; }
.hyper-detail-section h3 {
  font-family: var(--sw-mono);
  font-size: 0.72rem;
  font-weight: 400;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--sw-text-soft);
  margin: 0 0 0.3rem;
  padding-bottom: 0.25rem;
  border-bottom: 1px solid var(--sw-border-soft);
}
.hyper-detail-list {
  margin: 0;
  padding-left: 1.25rem;
  font-family: var(--sw-mono);
  font-size: 0.78rem;
  color: var(--sw-text);
  max-height: 12rem;
  overflow-y: auto;
}
.hyper-detail-list li { word-break: break-all; }

.hyper-detail-kv {
  margin: 0;
  font-family: var(--sw-mono);
  font-size: 0.78rem;
  border-collapse: collapse;
  width: 100%;
}
.hyper-detail-kv th,
.hyper-detail-kv dt {
  text-align: left;
  font-weight: 400;
  color: var(--sw-text-soft);
  padding: 0.15rem 0.6rem 0.15rem 0;
  vertical-align: top;
  white-space: nowrap;
  letter-spacing: 0.06em;
}
.hyper-detail-kv td,
.hyper-detail-kv dd {
  margin: 0;
  padding: 0.15rem 0;
  color: var(--sw-text);
  word-break: break-all;
}

/* --- gcu:log timeline --- */

.hyper-log-list {
  margin: 0;
  padding: 0;
  list-style: none;
  font-family: var(--sw-mono);
  font-size: 0.78rem;
  max-height: 14rem;
  overflow-y: auto;
}
.hyper-log__entry {
  display: grid;
  grid-template-columns: 5rem 6rem 1fr;
  gap: 0.5rem;
  padding: 0.15rem 0;
  align-items: baseline;
}
.hyper-log__t {
  color: var(--sw-text-soft);
  white-space: nowrap;
}
.hyper-log__type {
  color: var(--sw-text-mid);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 0.7rem;
}
/* Map known event types to Switchboard accent semantics:
 * teal=info (boot), red=fault (error), amber=caution (upgrade) */
.hyper-log__type--boot    { color: var(--sw-teal); }
.hyper-log__type--error   { color: var(--sw-red); }
.hyper-log__type--upgrade { color: var(--sw-amber); }
.hyper-log__type--reset   { color: var(--sw-indigo); }

.hyper-log__msg {
  color: var(--sw-text);
  word-break: break-word;
}
</style>
</head>
<body>
  <main id="app"></main>
  <script>// Tool discovery: read gcu:tool:* announcements, fall back to heuristics,
// then attribute observed storage (caches/IDBs/LS/SW scopes) to each tool.
//
// All functions here are pure — they take strings and lists, return objects.
// The browser-side glue (reading localStorage, calling caches.keys() etc.)
// lives in inspect.js. Keeping detect pure makes it node-testable.

const KNOWN_TOOL_NAMES = ['ep', 'calque', 'dee', 'plan', 'rv', 'gcu-press', 'beacon'];

const TOOL_KEY_RE = /^gcu:tool:(.*)$/;
const LOG_KEY_RE = /^gcu:log:(.*)$/;
const IMG_KEY_RE = /^gcu:img:(.*)$/;

// 50 KB on disk = "your tool is clearly outside the spec'd ~25 KB worst case".
// See SPEC §gcu:log "Strict caps".
const LOG_RING_SIZE_WARN = 50 * 1024;

function parseAnnouncements(localStorageEntries) {
  const tools = [];
  const malformed = [];
  for (const [key, value] of localStorageEntries) {
    const match = TOOL_KEY_RE.exec(key);
    if (!match) continue;
    const suffix = match[1];
    if (!suffix) {
      malformed.push({ key, reason: 'empty name suffix' });
      continue;
    }
    let parsed;
    try {
      parsed = JSON.parse(value);
    } catch {
      malformed.push({ key, reason: 'invalid JSON' });
      continue;
    }
    if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) {
      malformed.push({ key, reason: 'announcement is not an object' });
      continue;
    }
    if (parsed.name !== suffix) {
      malformed.push({
        key,
        reason: `name field "${parsed.name}" does not match key suffix "${suffix}"`,
      });
      continue;
    }
    tools.push({
      name: suffix,
      source: 'announcement',
      announcement: parsed,
      storageKeys: parsed.storageKeys || {},
    });
  }
  return { tools, malformed };
}

function inferTools(observed, alreadyKnownNames) {
  const known = new Set(alreadyKnownNames);
  const inferred = new Map();

  const ensure = (name) => {
    if (known.has(name) || !KNOWN_TOOL_NAMES.includes(name)) return null;
    if (!inferred.has(name)) {
      inferred.set(name, {
        name,
        source: 'heuristic',
        announcement: null,
        storageKeys: {
          idb: [],
          cacheNames: [],
          swScopes: [],
          localStoragePrefix: `${name}:`,
        },
      });
    }
    return inferred.get(name);
  };

  const pushUnique = (arr, item) => { if (!arr.includes(item)) arr.push(item); };

  for (const idb of observed.idbNames || []) {
    if (KNOWN_TOOL_NAMES.includes(idb)) {
      const tool = ensure(idb);
      if (tool) pushUnique(tool.storageKeys.idb, idb);
    }
  }
  for (const cache of observed.cacheNames || []) {
    for (const name of KNOWN_TOOL_NAMES) {
      if (cache === name || cache.startsWith(`${name}-`)) {
        const tool = ensure(name);
        if (tool) pushUnique(tool.storageKeys.cacheNames, cache);
        break;
      }
    }
  }
  for (const scope of observed.swScopes || []) {
    for (const name of KNOWN_TOOL_NAMES) {
      if (scope === `/${name}/` || scope.startsWith(`/${name}/`)) {
        const tool = ensure(name);
        if (tool) pushUnique(tool.storageKeys.swScopes, scope);
        break;
      }
    }
  }
  for (const lsKey of observed.localStorageKeys || []) {
    for (const name of KNOWN_TOOL_NAMES) {
      if (lsKey.startsWith(`${name}:`)) {
        ensure(name);
        break;
      }
    }
  }

  return [...inferred.values()];
}

function attribute(tools, observed) {
  const cacheNames = new Set(observed.cacheNames || []);
  const idbNames = new Set(observed.idbNames || []);
  const localStorageKeys = new Set(observed.localStorageKeys || []);
  const swScopes = new Set(observed.swScopes || []);

  const attributed = {};
  for (const tool of tools) {
    const claim = { cacheNames: [], idbNames: [], localStorageKeys: [], swScopes: [] };
    const sk = tool.storageKeys || {};
    for (const name of sk.cacheNames || []) {
      if (cacheNames.delete(name)) claim.cacheNames.push(name);
    }
    for (const name of sk.idb || []) {
      if (idbNames.delete(name)) claim.idbNames.push(name);
    }
    for (const scope of sk.swScopes || []) {
      if (swScopes.delete(scope)) claim.swScopes.push(scope);
    }
    if (sk.localStoragePrefix) {
      for (const key of [...localStorageKeys]) {
        if (key.startsWith(sk.localStoragePrefix)) {
          claim.localStorageKeys.push(key);
          localStorageKeys.delete(key);
        }
      }
    }
    attributed[tool.name] = claim;
  }
  return {
    attributed,
    unattributed: {
      cacheNames: [...cacheNames],
      idbNames: [...idbNames],
      localStorageKeys: [...localStorageKeys],
      swScopes: [...swScopes],
    },
  };
}

// Parse the gcu:log:<name> rings per SPEC §gcu:log diagnostic convention.
// Pure: input is localStorage entries, output is parsed logs + warnings.
// Hyper surfaces logs in each tool's show-details section; warnings appear
// alongside malformed announcements so misbehaving tools are visible.
function parseLogs(localStorageEntries) {
  const logs = new Map();
  const warnings = [];
  for (const [key, value] of localStorageEntries) {
    const match = LOG_KEY_RE.exec(key);
    if (!match) continue;
    const suffix = match[1];
    if (!suffix) {
      warnings.push({ key, reason: 'empty tool name' });
      continue;
    }

    // UTF-16 byte estimate of the raw stored value.
    const byteLen = (value || '').length * 2;
    if (byteLen > LOG_RING_SIZE_WARN) {
      warnings.push({
        key,
        reason: `ring is ${Math.round(byteLen / 1024)} KB on disk (cap is ~25 KB; tool may have a logging bug)`,
      });
      // Don't bail — partial info still useful.
    }

    let parsed;
    try {
      parsed = JSON.parse(value);
    } catch {
      warnings.push({ key, reason: 'invalid JSON' });
      continue;
    }
    if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) {
      warnings.push({ key, reason: 'expected an object with an entries array' });
      continue;
    }
    if (!Array.isArray(parsed.entries)) {
      warnings.push({ key, reason: 'missing entries[] array' });
      continue;
    }

    // Filter out entries that don't have the minimum shape (t: number, type: string).
    const valid = [];
    for (const e of parsed.entries) {
      if (!e || typeof e !== 'object') continue;
      if (typeof e.t !== 'number' || !Number.isFinite(e.t)) continue;
      if (typeof e.type !== 'string') continue;
      valid.push(e);
    }

    logs.set(suffix, {
      schema: typeof parsed.schema === 'number' ? parsed.schema : 1,
      entries: valid,
    });
  }
  return { logs, warnings };
}

// Parse the gcu:img:<id> markers per SPEC §gcu:img container convention.
// Pure: input is localStorage entries, output is parsed images + warnings.
// Each image carries a _lsKey field with its original LS key for cleanup.
function parseImages(localStorageEntries) {
  const images = [];
  const warnings = [];
  for (const [key, value] of localStorageEntries) {
    const match = IMG_KEY_RE.exec(key);
    if (!match) continue;
    const suffix = match[1];
    if (!suffix) {
      warnings.push({ key, reason: 'empty image id' });
      continue;
    }
    let parsed;
    try {
      parsed = JSON.parse(value);
    } catch {
      warnings.push({ key, reason: 'invalid JSON' });
      continue;
    }
    if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) {
      warnings.push({ key, reason: 'announcement is not an object' });
      continue;
    }
    const required = ['id', 'name', 'runtime'];
    const missing = required.filter((f) => !parsed[f]);
    if (missing.length) {
      warnings.push({ key, reason: `missing required field(s): ${missing.join(', ')}` });
      continue;
    }
    if (parsed.id !== suffix) {
      warnings.push({
        key,
        reason: `id field "${parsed.id}" does not match key suffix "${suffix}"`,
      });
      continue;
    }
    images.push({ ...parsed, _lsKey: key });
  }
  return { images, warnings };
}

// Collect IDB names to probe when indexedDB.databases() isn't available
// (older Safari, some WebViews). Combines announced IDBs from gcu:tool:*
// markers with KNOWN_TOOL_NAMES as a best-effort fallback for tools that
// haven't shipped the announcement yet.
function gatherIdbHints(localStorageEntries) {
  const { tools } = parseAnnouncements(localStorageEntries);
  const announced = tools.flatMap((t) => (t.storageKeys && t.storageKeys.idb) || []);
  return [...new Set([...announced, ...KNOWN_TOOL_NAMES])];
}

function detectTools(localStorageEntries, observed) {
  const { tools: announced, malformed } = parseAnnouncements(localStorageEntries);
  // Strip gcu:tool:*, gcu:log:*, gcu:img:* keys from observed LS — they are
  // hyper's own metadata, not tool data to be attributed.
  const lsForAttribution = (observed.localStorageKeys || []).filter(
    (k) => !TOOL_KEY_RE.test(k) && !LOG_KEY_RE.test(k) && !IMG_KEY_RE.test(k),
  );
  const observedForInference = { ...observed, localStorageKeys: lsForAttribution };
  const inferred = inferTools(observedForInference, announced.map((t) => t.name));
  const allTools = [...announced, ...inferred];
  const { attributed, unattributed } = attribute(allTools, observedForInference);
  return {
    tools: allTools.map((t) => ({ ...t, storage: attributed[t.name] })),
    unattributed,
    malformed,
  };
}

if (typeof module !== 'undefined') {
  module.exports = {
    KNOWN_TOOL_NAMES,
    TOOL_KEY_RE,
    LOG_KEY_RE,
    IMG_KEY_RE,
    parseAnnouncements,
    parseLogs,
    parseImages,
    inferTools,
    attribute,
    detectTools,
    gatherIdbHints,
  };
}

// Enumerate caches, IDB databases, localStorage, sessionStorage, and SW
// registrations on the current origin. Two layers:
//
// 1. Browser-side enumerators (listCaches, listIdbs, ...) call the platform
//    APIs. Each guards on `typeof <global> === 'undefined'` so the module is
//    safe to require in node — missing APIs degrade to empty results.
// 2. Pure helpers (toObserved, summarizeCache, summarizeOrigin, ...) take the
//    enumerator output and reshape/summarize it. These are node-testable.
//
// Note on IDB: indexedDB.databases() is not available on every browser. When
// missing we return []. Callers that want pre-2023 Safari / older WebView
// coverage can fall back to opening names from gcu:tool announcements.

async function inspectOrigin({ idbHints = [] } = {}) {
  const [cacheList, idbList, ls, ss, swList, estimate] = await Promise.all([
    listCaches(),
    listIdbs(idbHints),
    Promise.resolve(listLocalStorage()),
    Promise.resolve(listSessionStorage()),
    listServiceWorkers(),
    getQuotaEstimate(),
  ]);
  return {
    caches: cacheList,
    idbs: idbList,
    localStorage: ls,
    sessionStorage: ss,
    swRegistrations: swList,
    estimate,
  };
}

async function listCaches() {
  if (typeof caches === 'undefined') return [];
  const names = await caches.keys();
  const results = [];
  for (const name of names) {
    const cache = await caches.open(name);
    const keys = await cache.keys();
    results.push({
      name,
      entryCount: keys.length,
      entryUrls: keys.map((r) => r.url),
    });
  }
  return results;
}

async function listIdbs(hints = []) {
  if (typeof indexedDB === 'undefined') return [];
  if (typeof indexedDB.databases === 'function') return enumerateIdbsNative();
  return enumerateIdbsByHints(hints);
}

async function enumerateIdbsNative() {
  const dbs = await indexedDB.databases();
  const results = [];
  for (const meta of dbs) {
    if (!meta.name) continue;
    try {
      const db = await openIdb(meta.name);
      const stores = [];
      for (const storeName of db.objectStoreNames) {
        stores.push({ name: storeName, recordCount: await countRecords(db, storeName) });
      }
      db.close();
      results.push({ name: meta.name, version: meta.version, stores });
    } catch (e) {
      results.push({ name: meta.name, version: meta.version, stores: [], error: String(e) });
    }
  }
  return results;
}

// Fallback for browsers without indexedDB.databases() (older Safari, some
// WebViews). Probes each candidate name; uses onupgradeneeded(oldVersion=0)
// to detect when we accidentally created an empty DB, then deletes it so
// the probe doesn't pollute the user's origin.
async function enumerateIdbsByHints(names) {
  const results = [];
  for (const name of names) {
    const result = await openIdbIfExists(name);
    if (result) results.push(result);
  }
  return results;
}

function openIdbIfExists(name) {
  return new Promise((resolve) => {
    let createdByUs = false;
    const req = indexedDB.open(name);
    req.onupgradeneeded = (e) => {
      if (e.oldVersion === 0) createdByUs = true;
    };
    req.onsuccess = async () => {
      const db = req.result;
      if (createdByUs) {
        db.close();
        await new Promise((res) => {
          const del = indexedDB.deleteDatabase(name);
          del.onsuccess = () => res();
          del.onerror = () => res();
          del.onblocked = () => res();
        });
        resolve(null);
        return;
      }
      try {
        const stores = [];
        for (const storeName of db.objectStoreNames) {
          stores.push({ name: storeName, recordCount: await countRecords(db, storeName) });
        }
        db.close();
        resolve({ name, version: db.version, stores });
      } catch (e) {
        db.close();
        resolve({ name, version: db.version, stores: [], error: String(e) });
      }
    };
    req.onerror = () => resolve(null);
    req.onblocked = () => resolve(null);
  });
}

function openIdb(name) {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(name);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
    req.onblocked = () => reject(new Error('blocked'));
  });
}

function countRecords(db, storeName) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).count();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function listLocalStorage() {
  return readStorage(typeof localStorage === 'undefined' ? null : localStorage);
}

function listSessionStorage() {
  return readStorage(typeof sessionStorage === 'undefined' ? null : sessionStorage);
}

function readStorage(store) {
  if (!store) return [];
  const entries = [];
  for (let i = 0; i < store.length; i++) {
    const key = store.key(i);
    if (key === null) continue;
    entries.push([key, store.getItem(key)]);
  }
  return entries;
}

async function listServiceWorkers() {
  if (typeof navigator === 'undefined' || !navigator.serviceWorker) return [];
  const regs = await navigator.serviceWorker.getRegistrations();
  return regs.map((r) => {
    const worker = r.active || r.waiting || r.installing;
    return {
      scope: r.scope,
      scriptURL: worker ? worker.scriptURL : null,
      state: worker ? worker.state : 'none',
    };
  });
}

async function getQuotaEstimate() {
  if (typeof navigator === 'undefined' || !navigator.storage || !navigator.storage.estimate) return null;
  return await navigator.storage.estimate();
}

// --- Size helpers --------------------------------------------------------
//
// Cheap-and-pure: LS / SS byte totals are derived from string lengths
// (UTF-16, 2 bytes per char). Run on every load.
//
// Expensive-and-async: cache byte totals require fetching every Response
// body. Opt-in only — main.js triggers via "compute sizes" action; default
// load skips it to preserve hyper's escape-hatch fast-paint property.

function bytesForLocalStorage(entries) {
  return sumStringBytes(entries);
}

function bytesForSessionStorage(entries) {
  return sumStringBytes(entries);
}

function sumStringBytes(entries) {
  let total = 0;
  for (const [k, v] of entries || []) {
    total += (k ? k.length : 0) * 2;
    total += (v ? v.length : 0) * 2;
  }
  return total;
}

async function bytesForCache(name) {
  if (typeof caches === 'undefined') return 0;
  const cache = await caches.open(name);
  const keys = await cache.keys();
  let total = 0;
  for (const req of keys) {
    const res = await cache.match(req);
    if (!res) continue;
    const blob = await res.blob();
    total += blob.size;
  }
  return total;
}

async function bytesForCaches(names) {
  const out = new Map();
  for (const name of names) {
    try {
      out.set(name, await bytesForCache(name));
    } catch {
      out.set(name, null); // null = could not compute (e.g. opaque response)
    }
  }
  return out;
}

// --- Pure helpers --------------------------------------------------------

// Extract the minimal shape that detect.detectTools consumes.
function toObserved(inspectResult) {
  return {
    cacheNames: inspectResult.caches.map((c) => c.name),
    idbNames: inspectResult.idbs.map((i) => i.name),
    localStorageKeys: inspectResult.localStorage.map(([k]) => k),
    swScopes: inspectResult.swRegistrations.map((r) => normalizeScope(r.scope)),
  };
}

// SW scopes come back from getRegistrations() as full URLs ("https://host/ep/").
// detect's heuristics work in path space ("/ep/"), so we strip to pathname.
function normalizeScope(scope) {
  try {
    return new URL(scope).pathname;
  } catch {
    return scope;
  }
}

function distinctHosts(urls) {
  const hosts = new Set();
  for (const u of urls) {
    try { hosts.add(new URL(u).host); } catch { /* skip non-URLs */ }
  }
  return [...hosts];
}

function summarizeCache(cache) {
  return {
    name: cache.name,
    entryCount: cache.entryCount,
    distinctHosts: distinctHosts(cache.entryUrls || []),
  };
}

function summarizeOrigin(inspectResult) {
  const cacheEntryTotal = inspectResult.caches.reduce((s, c) => s + c.entryCount, 0);
  const idbRecordTotal = inspectResult.idbs.reduce(
    (s, i) => s + i.stores.reduce((a, st) => a + st.recordCount, 0),
    0,
  );
  return {
    cacheCount: inspectResult.caches.length,
    cacheEntryTotal,
    idbCount: inspectResult.idbs.length,
    idbRecordTotal,
    localStorageCount: inspectResult.localStorage.length,
    sessionStorageCount: inspectResult.sessionStorage.length,
    swCount: inspectResult.swRegistrations.length,
    quotaUsed: inspectResult.estimate ? inspectResult.estimate.usage : null,
    quotaTotal: inspectResult.estimate ? inspectResult.estimate.quota : null,
  };
}

if (typeof module !== 'undefined') {
  module.exports = {
    inspectOrigin,
    listCaches,
    listIdbs,
    listLocalStorage,
    listSessionStorage,
    listServiceWorkers,
    getQuotaEstimate,
    bytesForLocalStorage,
    bytesForSessionStorage,
    bytesForCache,
    bytesForCaches,
    toObserved,
    normalizeScope,
    distinctHosts,
    summarizeCache,
    summarizeOrigin,
  };
}

// Bundle IDB + localStorage (+ sessionStorage) into the JSON shape from
// SPEC §Export, and trigger a browser download.
//
// Pure layer (testable): buildBundle, buildToolBundle, filenameTimestamp.
// Browser layer: readIdbContents (cursor walk per store), downloadBundle
//                (Blob + synthetic <a download> click).
//
// Cache Storage is intentionally NOT included — caches are regenerable from
// the network. SPEC mentions an opt-in "include caches" toggle; deferred.

function buildBundle({ detectResult, idbContents, lsEntries, ssEntries, origin, exportedAt }) {
  const lsMap = toMap(lsEntries);
  const ssMap = toMap(ssEntries);
  const idbMap = toMap(idbContents);

  const tools = {};
  for (const tool of detectResult.tools) {
    tools[tool.name] = buildToolBundle(tool, idbMap, lsMap);
  }

  const unattributed = {
    idb: pickKeys(idbMap, detectResult.unattributed.idbNames),
    localStorage: pickKeys(lsMap, detectResult.unattributed.localStorageKeys),
    sessionStorage: Object.fromEntries(ssMap),
  };

  return {
    exportedAt: exportedAt || new Date().toISOString(),
    exportedFrom: origin || '',
    tools,
    unattributed,
  };
}

function buildToolBundle(tool, idbMap, lsMap) {
  const out = {
    version: (tool.announcement && tool.announcement.version) || null,
    source: tool.source,
    idb: pickKeys(idbMap, tool.storage.idbNames || []),
    localStorage: pickKeys(lsMap, tool.storage.localStorageKeys || []),
  };
  return out;
}

function pickKeys(map, keys) {
  const out = {};
  for (const k of keys) {
    if (map.has(k)) out[k] = map.get(k);
  }
  return out;
}

function toMap(input) {
  if (!input) return new Map();
  if (input instanceof Map) return input;
  if (Array.isArray(input)) return new Map(input);
  return new Map(Object.entries(input));
}

function filenameTimestamp(date) {
  return (date || new Date()).toISOString().replace(/[:.]/g, '-').slice(0, 19);
}

// --- Browser layer -------------------------------------------------------

function readIdbContents(name) {
  return new Promise((resolve, reject) => {
    if (typeof indexedDB === 'undefined') { resolve({}); return; }
    const req = indexedDB.open(name);
    req.onerror = () => reject(req.error);
    req.onblocked = () => reject(new Error('blocked'));
    req.onsuccess = async () => {
      const db = req.result;
      const out = {};
      try {
        for (const storeName of db.objectStoreNames) {
          out[storeName] = await readStore(db, storeName);
        }
        db.close();
        resolve(out);
      } catch (e) {
        db.close();
        reject(e);
      }
    };
  });
}

function readStore(db, storeName) {
  return new Promise((resolve, reject) => {
    const records = [];
    const req = db.transaction(storeName, 'readonly').objectStore(storeName).openCursor();
    req.onsuccess = (e) => {
      const cursor = e.target.result;
      if (cursor) {
        records.push(cursor.value);
        cursor.continue();
      } else {
        resolve(records);
      }
    };
    req.onerror = () => reject(req.error);
  });
}

function downloadBundle(bundle, filename) {
  if (typeof Blob === 'undefined' || typeof URL === 'undefined' || typeof document === 'undefined') {
    return false;
  }
  const blob = new Blob([JSON.stringify(bundle, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  return true;
}

// --- Orchestrators -------------------------------------------------------

async function exportAll(state) {
  const idbNames = uniq([
    ...state.detectResult.tools.flatMap((t) => t.storage.idbNames || []),
    ...state.detectResult.unattributed.idbNames,
  ]);
  const idbContents = await readManyIdbs(idbNames);
  const bundle = buildBundle({
    detectResult: state.detectResult,
    idbContents,
    lsEntries: state.inspectResult.localStorage,
    ssEntries: state.inspectResult.sessionStorage,
    origin: state.origin,
  });
  downloadBundle(bundle, `hyper-export-${filenameTimestamp()}.json`);
  return bundle;
}

async function exportUnattributed(state) {
  const idbContents = await readManyIdbs(state.detectResult.unattributed.idbNames || []);
  const synthetic = {
    tools: [],
    unattributed: state.detectResult.unattributed,
    malformed: [],
  };
  const bundle = buildBundle({
    detectResult: synthetic,
    idbContents,
    lsEntries: state.inspectResult.localStorage,
    ssEntries: state.inspectResult.sessionStorage,
    origin: state.origin,
  });
  downloadBundle(bundle, `hyper-export-unattributed-${filenameTimestamp()}.json`);
  return bundle;
}

async function exportTool(state, toolName) {
  const tool = state.detectResult.tools.find((t) => t.name === toolName);
  if (!tool) throw new Error(`tool not found: ${toolName}`);
  const idbContents = await readManyIdbs(tool.storage.idbNames || []);
  const synthetic = {
    tools: [tool],
    unattributed: { idbNames: [], localStorageKeys: [], cacheNames: [], swScopes: [] },
    malformed: [],
  };
  const bundle = buildBundle({
    detectResult: synthetic,
    idbContents,
    lsEntries: state.inspectResult.localStorage,
    ssEntries: state.inspectResult.sessionStorage,
    origin: state.origin,
  });
  downloadBundle(bundle, `hyper-export-${tool.name}-${filenameTimestamp()}.json`);
  return bundle;
}

async function readManyIdbs(names) {
  const map = new Map();
  for (const name of names) {
    try {
      map.set(name, await readIdbContents(name));
    } catch (e) {
      map.set(name, { __error: String(e && e.message ? e.message : e) });
    }
  }
  return map;
}

function uniq(arr) { return [...new Set(arr)]; }

if (typeof module !== 'undefined') {
  module.exports = {
    buildBundle,
    buildToolBundle,
    pickKeys,
    toMap,
    filenameTimestamp,
    readIdbContents,
    downloadBundle,
    exportAll,
    exportTool,
    exportUnattributed,
  };
}

// Destructive operations: clear caches / unregister SWs / delete IDBs /
// clear LS, plus the orchestrations (force-refresh, reset-tool, nuke).
//
// Same two-layer pattern as inspect.js:
//   - plan* helpers are pure (testable) and produce the data shown in
//     confirmation dialogs ("will delete: 2 caches, 1 SW, ...").
//   - exec* functions touch platform APIs; each guards on `typeof`.
//
// Confirmation gating lives in main.js — actions here just do the work.

// --- Pure planning helpers ------------------------------------------------

function planResetTool(tool) {
  const sk = (tool && tool.storage) || {};
  return {
    cacheNames: sk.cacheNames || [],
    swScopes: sk.swScopes || [],
    idbNames: sk.idbNames || [],
    localStorageKeys: sk.localStorageKeys || [],
    sessionStorageKeys: [],
  };
}

function planForceRefresh(tool, currentOrigin) {
  const sk = (tool && tool.storage) || {};
  return {
    cacheNames: sk.cacheNames || [],
    swScopes: sk.swScopes || [],
    url: pickToolURL(tool, currentOrigin),
  };
}

function planNuke(inspectResult) {
  return {
    cacheNames: inspectResult.caches.map((c) => c.name),
    swScopes: inspectResult.swRegistrations.map((r) => r.scope),
    idbNames: inspectResult.idbs.map((i) => i.name),
    localStorageKeys: inspectResult.localStorage.map(([k]) => k),
    sessionStorageKeys: inspectResult.sessionStorage.map(([k]) => k),
  };
}

// Per SPEC §gcu:img: an image owns a single IDB record plus a prefix-set of
// records in another store, plus optionally a SW scope. Cleanup is per-record,
// not per-database.
function planResetImage(image) {
  const sk = (image && image.storageKeys) || {};
  return {
    lsKey: image && image._lsKey ? image._lsKey : (image && image.id ? `gcu:img:${image.id}` : null),
    idbDb: sk.idbDb || null,
    idbImageStore: sk.idbImageStore || null,
    idbImageKey: sk.idbImageKey || null,
    idbStorageStore: sk.idbStorageStore || null,
    idbStorageStorePrefix: sk.idbStorageStorePrefix || null,
    swScope: (image && image.scope) || null,
  };
}

function describeImagePlan(plan) {
  const parts = [];
  if (plan.lsKey) parts.push('LS marker');
  if (plan.idbImageKey) parts.push('IDB image record');
  if (plan.idbStorageStorePrefix) parts.push('all IDB storage entries');
  if (plan.swScope) parts.push('service worker registration');
  return parts.length ? parts.join(', ') : 'nothing';
}

// Includes all of sessionStorage because no tool announces ownership of SS
// keys — anything in SS is implicitly unattributed.
function planResetUnattributed(detectResult, inspectResult) {
  const u = detectResult.unattributed;
  return {
    cacheNames: [...u.cacheNames],
    swScopes: [...u.swScopes],
    idbNames: [...u.idbNames],
    localStorageKeys: [...u.localStorageKeys],
    sessionStorageKeys: inspectResult.sessionStorage.map(([k]) => k),
  };
}

function pickToolURL(tool, currentOrigin) {
  if (!tool) return null;
  const links = tool.announcement && tool.announcement.links;
  const homepage = links && links.homepage;
  // Use the announced homepage only when it resolves to the current origin —
  // otherwise we'd open the prod URL when hyper is running locally or
  // co-hosted on a third-party origin. Falls through to a SW scope (a
  // relative path) so window.open lands on the local copy of the tool.
  if (homepage && (!currentOrigin || isSameOrigin(homepage, currentOrigin))) {
    return homepage;
  }
  const scopes = tool.storage && tool.storage.swScopes;
  if (scopes && scopes[0]) return scopes[0];
  return null;
}

function isSameOrigin(url, currentOrigin) {
  try {
    return new URL(url, currentOrigin + '/').origin === currentOrigin;
  } catch {
    return false;
  }
}

function describePlan(plan) {
  const parts = [];
  const pushIf = (count, singular, plural) => {
    if (count > 0) parts.push(`${count} ${count === 1 ? singular : plural}`);
  };
  pushIf((plan.cacheNames || []).length, 'cache', 'caches');
  pushIf((plan.swScopes || []).length, 'service worker', 'service workers');
  pushIf((plan.idbNames || []).length, 'IDB database', 'IDB databases');
  pushIf((plan.localStorageKeys || []).length, 'localStorage key', 'localStorage keys');
  pushIf((plan.sessionStorageKeys || []).length, 'sessionStorage key', 'sessionStorage keys');
  return parts.length ? parts.join(', ') : 'nothing';
}

// --- Browser-side primitives ----------------------------------------------

async function clearCaches(names) {
  if (typeof caches === 'undefined') return { cleared: [] };
  const cleared = [];
  for (const name of names) {
    if (await caches.delete(name)) cleared.push(name);
  }
  return { cleared };
}

async function unregisterScopes(scopes) {
  if (typeof navigator === 'undefined' || !navigator.serviceWorker) {
    return { unregistered: [] };
  }
  const targets = new Set(scopes);
  const regs = await navigator.serviceWorker.getRegistrations();
  const unregistered = [];
  for (const reg of regs) {
    if (targets.has(reg.scope) || targets.has(scopePath(reg.scope))) {
      if (await reg.unregister()) unregistered.push(reg.scope);
    }
  }
  return { unregistered };
}

function scopePath(scope) {
  try { return new URL(scope).pathname; } catch { return scope; }
}

function deleteIdbs(names) {
  if (typeof indexedDB === 'undefined') return Promise.resolve({ deleted: [], blocked: [], errors: [] });
  return Promise.all(names.map(deleteIdb)).then((results) => ({
    deleted: results.filter((r) => r.status === 'deleted').map((r) => r.name),
    blocked: results.filter((r) => r.status === 'blocked').map((r) => r.name),
    errors: results.filter((r) => r.status === 'error').map((r) => r.name),
  }));
}

function deleteIdb(name) {
  return new Promise((resolve) => {
    const req = indexedDB.deleteDatabase(name);
    req.onsuccess = () => resolve({ name, status: 'deleted' });
    req.onerror = () => resolve({ name, status: 'error' });
    // Blocked means another tab holds the DB open; we resolve so the UI can
    // tell the user. The delete request itself stays pending and may complete
    // later when the blocker closes. Re-running will be a no-op by then.
    req.onblocked = () => resolve({ name, status: 'blocked' });
  });
}

// Delete a single record from an IDB store, by key. Used for per-image
// cleanup where we want to leave other records in the store intact.
function deleteIdbRecord(dbName, storeName, key) {
  return new Promise((resolve) => {
    if (typeof indexedDB === 'undefined') { resolve(false); return; }
    const openReq = indexedDB.open(dbName);
    openReq.onerror = () => resolve(false);
    openReq.onblocked = () => resolve(false);
    openReq.onsuccess = () => {
      const db = openReq.result;
      try {
        const tx = db.transaction(storeName, 'readwrite');
        const delReq = tx.objectStore(storeName).delete(key);
        delReq.onsuccess = () => { db.close(); resolve(true); };
        delReq.onerror = () => { db.close(); resolve(false); };
      } catch {
        db.close();
        resolve(false);
      }
    };
  });
}

// Walk an IDB store with a key range bounded by prefix, deleting each match.
// Returns the count of records deleted. The upper bound uses U+FFFF as a
// sentinel — any string starting with prefix sorts before prefix+'￿'.
function deleteIdbRecordsByPrefix(dbName, storeName, prefix) {
  return new Promise((resolve) => {
    if (typeof indexedDB === 'undefined') { resolve(0); return; }
    const openReq = indexedDB.open(dbName);
    openReq.onerror = () => resolve(0);
    openReq.onblocked = () => resolve(0);
    openReq.onsuccess = () => {
      const db = openReq.result;
      try {
        const tx = db.transaction(storeName, 'readwrite');
        const store = tx.objectStore(storeName);
        const range = IDBKeyRange.bound(prefix, prefix + '￿', false, true);
        const cursorReq = store.openCursor(range);
        let count = 0;
        cursorReq.onsuccess = (e) => {
          const cursor = e.target.result;
          if (cursor) {
            cursor.delete();
            count++;
            cursor.continue();
          } else {
            db.close();
            resolve(count);
          }
        };
        cursorReq.onerror = () => { db.close(); resolve(count); };
      } catch {
        db.close();
        resolve(0);
      }
    };
  });
}

function clearLocalStorageKeys(keys) {
  if (typeof localStorage === 'undefined') return { cleared: [] };
  return clearStorageKeys(localStorage, keys);
}

function clearSessionStorageKeys(keys) {
  if (typeof sessionStorage === 'undefined') return { cleared: [] };
  return clearStorageKeys(sessionStorage, keys);
}

function clearStorageKeys(store, keys) {
  const cleared = [];
  for (const k of keys) {
    if (store.getItem(k) !== null) {
      store.removeItem(k);
      cleared.push(k);
    }
  }
  return { cleared };
}

// --- Orchestrations -------------------------------------------------------

async function resetTool(tool) {
  const plan = planResetTool(tool);
  const [c, s, i, l] = await Promise.all([
    clearCaches(plan.cacheNames),
    unregisterScopes(plan.swScopes),
    deleteIdbs(plan.idbNames),
    Promise.resolve(clearLocalStorageKeys(plan.localStorageKeys)),
  ]);
  return { caches: c, sws: s, idbs: i, localStorage: l };
}

async function forceRefreshTool(tool, openURL, currentOrigin) {
  const plan = planForceRefresh(tool, currentOrigin);
  const [s, c] = await Promise.all([
    unregisterScopes(plan.swScopes),
    clearCaches(plan.cacheNames),
  ]);
  if (plan.url && typeof openURL === 'function') openURL(plan.url);
  return { caches: c, sws: s, url: plan.url };
}

async function refreshAllTools(detectResult) {
  const results = [];
  for (const tool of detectResult.tools) {
    const plan = planForceRefresh(tool);
    const [s, c] = await Promise.all([
      unregisterScopes(plan.swScopes),
      clearCaches(plan.cacheNames),
    ]);
    results.push({ tool: tool.name, caches: c, sws: s });
  }
  return { results };
}

async function resetImage(image) {
  const plan = planResetImage(image);
  const result = {
    lsKeyRemoved: null,
    imageRecordDeleted: false,
    storageRecordsDeleted: 0,
    swUnregistered: [],
  };
  if (plan.lsKey && typeof localStorage !== 'undefined') {
    if (localStorage.getItem(plan.lsKey) !== null) {
      localStorage.removeItem(plan.lsKey);
      result.lsKeyRemoved = plan.lsKey;
    }
  }
  if (plan.idbDb && plan.idbImageStore && plan.idbImageKey != null) {
    result.imageRecordDeleted = await deleteIdbRecord(plan.idbDb, plan.idbImageStore, plan.idbImageKey);
  }
  if (plan.idbDb && plan.idbStorageStore && plan.idbStorageStorePrefix) {
    result.storageRecordsDeleted = await deleteIdbRecordsByPrefix(
      plan.idbDb, plan.idbStorageStore, plan.idbStorageStorePrefix,
    );
  }
  if (plan.swScope) {
    const { unregistered } = await unregisterScopes([plan.swScope]);
    result.swUnregistered = unregistered;
  }
  return result;
}

async function resetUnattributed(detectResult, inspectResult) {
  const plan = planResetUnattributed(detectResult, inspectResult);
  const [c, s, i, l, ss] = await Promise.all([
    clearCaches(plan.cacheNames),
    unregisterScopes(plan.swScopes),
    deleteIdbs(plan.idbNames),
    Promise.resolve(clearLocalStorageKeys(plan.localStorageKeys)),
    Promise.resolve(clearSessionStorageKeys(plan.sessionStorageKeys)),
  ]);
  return { caches: c, sws: s, idbs: i, localStorage: l, sessionStorage: ss };
}

async function nukeOrigin(inspectResult) {
  const plan = planNuke(inspectResult);
  const [c, s, i, l, ss] = await Promise.all([
    clearCaches(plan.cacheNames),
    unregisterScopes(plan.swScopes),
    deleteIdbs(plan.idbNames),
    Promise.resolve(clearLocalStorageKeys(plan.localStorageKeys)),
    Promise.resolve(clearSessionStorageKeys(plan.sessionStorageKeys)),
  ]);
  return { caches: c, sws: s, idbs: i, localStorage: l, sessionStorage: ss };
}

if (typeof module !== 'undefined') {
  module.exports = {
    planResetTool,
    planForceRefresh,
    planNuke,
    planResetUnattributed,
    planResetImage,
    describeImagePlan,
    pickToolURL,
    describePlan,
    scopePath,
    clearCaches,
    unregisterScopes,
    deleteIdbs,
    deleteIdbRecord,
    deleteIdbRecordsByPrefix,
    clearLocalStorageKeys,
    clearSessionStorageKeys,
    resetTool,
    forceRefreshTool,
    refreshAllTools,
    resetUnattributed,
    resetImage,
    nukeOrigin,
  };
}

// DOM rendering: take a detect/inspect result, produce the UI from SPEC §UI shape.
//
// Two layers, same pattern as inspect.js:
// 1. Pure helpers (formatBytes, decorateTool) — node-testable.
// 2. renderApp(state, root) — DOM construction; eyeball in browser.
//
// Action buttons carry data-action / data-tool attributes; main.js binds a
// single delegated click handler. Until actions.js exists, clicks are no-ops.

function formatBytes(bytes) {
  if (bytes == null) return '—';
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  if (bytes < 1024 * 1024 * 1024) return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
  return `${(bytes / 1024 / 1024 / 1024).toFixed(1)} GB`;
}

// Build the "show details" payload for a tool — cross-references the tool's
// claimed storage names against the rich inspect data, returning the per-cache
// URL list, per-IDB stores, LS key/value pairs, SW details, and (if logs are
// available) the parsed gcu:log entries for this tool.
function buildToolDetails(tool, inspectResult, logs) {
  const base = crossReferenceStorage(tool.storage, inspectResult);
  base.logEntries = (logs && logs.get && logs.get(tool.name) && logs.get(tool.name).entries) || [];
  return base;
}

// Same shape as buildToolDetails plus the full sessionStorage bucket (no
// tool announces SS ownership, so it's always unattributed).
function buildUnattributedDetails(unattributed, inspectResult) {
  const details = crossReferenceStorage(unattributed, inspectResult);
  details.sessionStorage = inspectResult.sessionStorage || [];
  return details;
}

function crossReferenceStorage(claim, inspectResult) {
  const cacheMap = new Map(inspectResult.caches.map((c) => [c.name, c]));
  const idbMap = new Map(inspectResult.idbs.map((i) => [i.name, i]));
  const lsMap = new Map(inspectResult.localStorage);
  const swMap = new Map(inspectResult.swRegistrations.map((r) => [normalizeScope(r.scope), r]));
  return {
    caches: (claim.cacheNames || [])
      .map((n) => cacheMap.get(n))
      .filter(Boolean)
      .map((c) => ({ name: c.name, urls: c.entryUrls || [] })),
    idbs: (claim.idbNames || [])
      .map((n) => idbMap.get(n))
      .filter(Boolean)
      .map((i) => ({ name: i.name, version: i.version, stores: i.stores || [] })),
    localStorage: (claim.localStorageKeys || [])
      .filter((k) => lsMap.has(k))
      .map((k) => [k, lsMap.get(k)]),
    sws: (claim.swScopes || [])
      .map((s) => swMap.get(s))
      .filter(Boolean)
      .map((r) => ({ scope: r.scope, scriptURL: r.scriptURL, state: r.state })),
  };
}

// Inline copy of inspect.normalizeScope. Kept here so render.js stays
// callable in node tests without requiring inspect.js (which depends on
// browser globals at top-level via async functions). Cheap and pure.
function normalizeScope(scope) {
  try { return new URL(scope).pathname; } catch { return scope; }
}

// Pure: shape an image marker for display. createdRel is a relative-time
// string derived against `now` (injectable for tests).
function decorateImage(image, now) {
  const createdAt = image && image.createdAt ? Date.parse(image.createdAt) : null;
  return {
    id: image && image.id,
    name: (image && image.name) || (image && image.id) || '(unnamed)',
    runtime: (image && image.runtime) || null,
    isolation: (image && image.isolation) || null,
    scope: (image && image.scope) || null,
    sizeEstimate: image && typeof image.sizeEstimate === 'number' ? image.sizeEstimate : null,
    createdAt,
    createdRel: createdAt != null && !Number.isNaN(createdAt)
      ? formatLogTime(createdAt, now != null ? now : Date.now())
      : null,
  };
}

// Same shape as decorateTool for the size fields, so renderSizeBar accepts
// either. The "name" field is the synthetic '__unattributed__' sentinel,
// not displayed — main.js looks at the action name to know which compute
// path to take, not the tool name.
function decorateUnattributed(unattributed, inspectResult, cacheSizes) {
  const lsMap = new Map(inspectResult.localStorage);
  let lsBytes = 0;
  for (const k of unattributed.localStorageKeys || []) {
    const v = lsMap.get(k);
    if (v != null) lsBytes += (k.length + v.length) * 2;
  }
  // SessionStorage is entirely unattributed (no tool announces SS ownership).
  for (const [k, v] of inspectResult.sessionStorage || []) {
    lsBytes += (k ? k.length : 0) * 2;
    lsBytes += (v ? v.length : 0) * 2;
  }

  const cacheNames = unattributed.cacheNames || [];
  let cacheBytes = 0;
  const hasCacheSizes = cacheNames.length === 0
    || (cacheSizes != null && cacheNames.every((n) => cacheSizes.has(n)));
  if (cacheSizes) {
    for (const n of cacheNames) {
      const b = cacheSizes.get(n);
      if (typeof b === 'number') cacheBytes += b;
    }
  }

  return {
    name: '__unattributed__',
    cacheCount: cacheNames.length,
    cacheBytes,
    hasCacheSizes,
    lsBytes,
  };
}

// Pure: build the bar segment data for a decorated tool, scaled against
// maxBytes (the largest total across all tools+unattributed, used so bars
// are visually comparable). Cache segment is omitted unless we have the
// data (decorated.hasCacheSizes), since drawing a guessed-size bar would
// mislead the user.
function buildBarSegments(decorated, maxBytes) {
  const segments = [];
  if (decorated.hasCacheSizes && decorated.cacheBytes > 0) {
    segments.push({ label: 'cache', bytes: decorated.cacheBytes });
  }
  if (decorated.lsBytes > 0) {
    segments.push({ label: 'ls', bytes: decorated.lsBytes });
  }
  const total = segments.reduce((s, x) => s + x.bytes, 0);
  const ref = maxBytes > 0 ? maxBytes : 1;
  for (const seg of segments) seg.percent = (seg.bytes / ref) * 100;
  return { segments, totalBytes: total };
}

function decorateTool(tool, inspectResult, cacheSizes) {
  const cacheMap = new Map(inspectResult.caches.map((c) => [c.name, c]));
  const idbMap = new Map(inspectResult.idbs.map((i) => [i.name, i]));
  const lsMap = new Map(inspectResult.localStorage);

  const cacheEntries = (tool.storage.cacheNames || [])
    .map((n) => cacheMap.get(n))
    .filter(Boolean)
    .reduce((s, c) => s + c.entryCount, 0);

  const idbRecords = (tool.storage.idbNames || [])
    .map((n) => idbMap.get(n))
    .filter(Boolean)
    .reduce((s, i) => s + i.stores.reduce((a, st) => a + st.recordCount, 0), 0);

  let lsBytes = 0;
  for (const k of tool.storage.localStorageKeys || []) {
    const v = lsMap.get(k);
    if (v != null) lsBytes += (k.length + v.length) * 2;
  }

  const cacheNames = tool.storage.cacheNames || [];
  let cacheBytes = 0;
  const hasCacheSizes = cacheNames.length === 0
    || (cacheSizes != null && cacheNames.every((n) => cacheSizes.has(n)));
  if (cacheSizes) {
    for (const n of cacheNames) {
      const b = cacheSizes.get(n);
      if (typeof b === 'number') cacheBytes += b;
    }
  }

  return {
    name: tool.name,
    displayName: (tool.announcement && tool.announcement.displayName) || tool.name,
    version: tool.announcement ? (tool.announcement.version || null) : null,
    source: tool.source,
    cacheCount: cacheNames.length,
    cacheEntries,
    cacheBytes,
    hasCacheSizes,
    idbCount: (tool.storage.idbNames || []).length,
    idbRecords,
    localStorageCount: (tool.storage.localStorageKeys || []).length,
    lsBytes,
    swCount: (tool.storage.swScopes || []).length,
  };
}

// --- DOM construction (browser only) -------------------------------------

function renderApp(state, root) {
  root.replaceChildren();

  // Decorate tools + unattributed once so bars across the whole page share
  // the same maxBytes scale.
  const decoratedTools = state.detectResult.tools.map((t) => ({
    tool: t,
    d: decorateTool(t, state.inspectResult, state.cacheSizes),
  }));
  const decoratedUnattributed = decorateUnattributed(
    state.detectResult.unattributed, state.inspectResult, state.cacheSizes,
  );
  const maxBytes = Math.max(1, ...[
    ...decoratedTools.map(({ d }) => d.cacheBytes + d.lsBytes),
    decoratedUnattributed.cacheBytes + decoratedUnattributed.lsBytes,
  ]);

  root.appendChild(renderHeader(state));
  root.appendChild(renderToolList(state, decoratedTools, maxBytes));
  const imageList = renderImageList(state);
  if (imageList) root.appendChild(imageList);
  const ssCount = state.inspectResult.sessionStorage.length;
  if (hasUnattributed(state.detectResult.unattributed) || ssCount > 0) {
    root.appendChild(renderUnattributed(
      state.detectResult.unattributed, state.inspectResult, decoratedUnattributed, maxBytes,
    ));
  }
  const issues = renderIssues(state.detectResult.malformed, state.logWarnings);
  if (issues) root.appendChild(issues);
  root.appendChild(renderGlobalActions());
}

function renderHeader(state) {
  const { origin, detectResult, inspectResult } = state;
  const summary = summaryStats(inspectResult, detectResult, state.images);
  const header = el('header', { class: 'hyper-header' });
  header.appendChild(el('h1', { text: `${origin} — GCU storage` }));
  const sub = el('p', { class: 'hyper-summary' });
  sub.appendChild(el('span', { text: `${summary.toolCount} tool${summary.toolCount === 1 ? '' : 's'} detected` }));
  if (summary.imageCount > 0) {
    sub.appendChild(el('span', { class: 'sep', text: ' · ' }));
    sub.appendChild(el('span', { text: `${summary.imageCount} container${summary.imageCount === 1 ? '' : 's'}` }));
  }
  sub.appendChild(el('span', { class: 'sep', text: ' · ' }));
  sub.appendChild(el('span', { text: `${formatBytes(summary.quotaUsed)} used` }));
  if (summary.quotaTotal != null) {
    sub.appendChild(el('span', { class: 'muted', text: ` (of ${formatBytes(summary.quotaTotal)} quota)` }));
  }
  header.appendChild(sub);
  return header;
}

function summaryStats(inspectResult, detectResult, images) {
  return {
    toolCount: detectResult.tools.length,
    imageCount: (images || []).length,
    quotaUsed: inspectResult.estimate ? inspectResult.estimate.usage : null,
    quotaTotal: inspectResult.estimate ? inspectResult.estimate.quota : null,
  };
}

function renderToolList(state, decoratedTools, maxBytes) {
  const list = el('section', { class: 'hyper-tools' });
  if (state.detectResult.tools.length === 0) {
    list.appendChild(el('p', { class: 'muted', text: 'No GCU tools detected on this origin.' }));
    return list;
  }
  for (const { tool, d } of decoratedTools) {
    list.appendChild(renderToolRow(d, tool, state.inspectResult, maxBytes, state.logs));
  }
  return list;
}

function renderToolRow(t, tool, inspectResult, maxBytes, logs) {
  const row = el('article', { class: `hyper-tool hyper-tool--${t.source}`, data: { tool: t.name } });
  const head = el('div', { class: 'hyper-tool__head' });
  head.appendChild(el('span', { class: 'hyper-tool__name', text: t.displayName }));
  if (t.version) head.appendChild(el('span', { class: 'hyper-tool__version', text: `v${t.version}` }));
  if (t.source === 'heuristic') head.appendChild(el('span', { class: 'hyper-tool__tag', text: 'inferred' }));
  row.appendChild(head);

  const bar = renderSizeBar(t, maxBytes);
  if (bar) row.appendChild(bar);

  const stats = el('div', { class: 'hyper-tool__stats' });
  stats.appendChild(el('span', { text: `${t.cacheCount} cache${t.cacheCount === 1 ? '' : 's'} (${t.cacheEntries} entries)` }));
  stats.appendChild(el('span', { text: `${t.idbCount} IDB (${t.idbRecords} records)` }));
  stats.appendChild(el('span', { text: `${t.localStorageCount} LS keys` }));
  stats.appendChild(el('span', { text: `${t.swCount} SW` }));
  row.appendChild(stats);

  const actions = el('div', { class: 'hyper-tool__actions' });
  actions.appendChild(actionButton('Export', 'export-tool', t.name));
  actions.appendChild(actionButton('Force refresh', 'refresh-tool', t.name));
  actions.appendChild(actionButton('Reset', 'reset-tool', t.name, 'danger'));
  row.appendChild(actions);

  row.appendChild(renderToolDetails(buildToolDetails(tool, inspectResult, logs)));
  return row;
}

// Returns null when there's nothing meaningful to render (no caches → no
// point comparing). Otherwise either a "compute me" placeholder or the
// actual bar with measured sizes.
//
// options.computeAction selects which dispatch case fires when the user
// clicks Compute (tools use 'compute-cache-sizes' with a tool name;
// unattributed uses 'compute-unattributed-cache-sizes' with no name).
function renderSizeBar(decorated, maxBytes, options = {}) {
  if (decorated.cacheCount === 0) return null;

  const computeAction = options.computeAction || 'compute-cache-sizes';
  const targetName = 'targetName' in options ? options.targetName : decorated.name;

  if (!decorated.hasCacheSizes) {
    const wrap = el('div', { class: 'hyper-bar-wrap hyper-bar-wrap--placeholder' });
    wrap.appendChild(el('span', {
      class: 'hyper-bar-label',
      text: `${decorated.cacheCount} cache${decorated.cacheCount === 1 ? '' : 's'} — size not measured`,
    }));
    wrap.appendChild(actionButton('Compute', computeAction, targetName));
    return wrap;
  }

  const bar = buildBarSegments(decorated, maxBytes);
  const wrap = el('div', { class: 'hyper-bar-wrap' });
  const track = el('div', { class: 'hyper-bar' });
  for (const seg of bar.segments) {
    track.appendChild(el('div', {
      class: `hyper-bar__seg hyper-bar__seg--${seg.label}`,
      attrs: { style: `width: ${seg.percent.toFixed(2)}%`, title: `${seg.label}: ${formatBytes(seg.bytes)}` },
    }));
  }
  wrap.appendChild(track);
  wrap.appendChild(el('div', { class: 'hyper-bar-label', text: `${formatBytes(bar.totalBytes)} total` }));
  return wrap;
}

function renderKVSection(label, entries) {
  const section = el('div', { class: 'hyper-detail-section' });
  section.appendChild(el('h3', { text: label }));
  const table = el('table', { class: 'hyper-detail-kv' });
  for (const [k, v] of entries) {
    const tr = el('tr');
    tr.appendChild(el('th', { text: k, attrs: { scope: 'row' } }));
    tr.appendChild(el('td', { text: v }));
    table.appendChild(tr);
  }
  section.appendChild(table);
  return section;
}

function renderToolDetails(details) {
  const wrap = el('details', { class: 'hyper-tool__details' });
  wrap.appendChild(el('summary', { text: 'Show details' }));

  const ss = details.sessionStorage || [];
  const logs = details.logEntries || [];
  if (details.caches.length === 0 && details.idbs.length === 0 && details.localStorage.length === 0 && details.sws.length === 0 && ss.length === 0 && logs.length === 0) {
    wrap.appendChild(el('p', { class: 'muted', text: 'No storage to inspect.' }));
    return wrap;
  }

  for (const c of details.caches) {
    const section = el('div', { class: 'hyper-detail-section' });
    section.appendChild(el('h3', { text: `cache: ${c.name} (${c.urls.length} entries)` }));
    if (c.urls.length) {
      const ul = el('ul', { class: 'hyper-detail-list' });
      for (const u of c.urls) ul.appendChild(el('li', { text: u }));
      section.appendChild(ul);
    }
    wrap.appendChild(section);
  }
  for (const i of details.idbs) {
    const section = el('div', { class: 'hyper-detail-section' });
    section.appendChild(el('h3', { text: `IDB: ${i.name}${i.version != null ? ` (v${i.version})` : ''}` }));
    if (i.stores.length) {
      const ul = el('ul', { class: 'hyper-detail-list' });
      for (const s of i.stores) ul.appendChild(el('li', { text: `${s.name}: ${s.recordCount} record${s.recordCount === 1 ? '' : 's'}` }));
      section.appendChild(ul);
    }
    wrap.appendChild(section);
  }
  if (details.localStorage.length) {
    wrap.appendChild(renderKVSection('localStorage', details.localStorage));
  }
  if (details.sessionStorage && details.sessionStorage.length) {
    wrap.appendChild(renderKVSection('sessionStorage', details.sessionStorage));
  }
  for (const sw of details.sws) {
    const section = el('div', { class: 'hyper-detail-section' });
    section.appendChild(el('h3', { text: `SW: ${sw.scope}` }));
    const dl = el('dl', { class: 'hyper-detail-kv' });
    dl.appendChild(el('dt', { text: 'state' }));
    dl.appendChild(el('dd', { text: sw.state }));
    if (sw.scriptURL) {
      dl.appendChild(el('dt', { text: 'script' }));
      dl.appendChild(el('dd', { text: sw.scriptURL }));
    }
    section.appendChild(dl);
    wrap.appendChild(section);
  }
  if (logs.length) {
    wrap.appendChild(renderLogSection(logs));
  }
  return wrap;
}

function renderLogSection(entries) {
  const section = el('div', { class: 'hyper-detail-section' });
  section.appendChild(el('h3', { text: `Recent events (${entries.length})` }));
  const list = el('ol', { class: 'hyper-log-list' });
  const now = Date.now();
  // Newest first
  for (const e of [...entries].reverse()) {
    const item = el('li', { class: 'hyper-log__entry' });
    item.appendChild(el('time', {
      class: 'hyper-log__t',
      text: formatLogTime(e.t, now),
      attrs: { datetime: new Date(e.t).toISOString(), title: new Date(e.t).toISOString() },
    }));
    item.appendChild(el('span', { class: `hyper-log__type hyper-log__type--${cssToken(e.type)}`, text: e.type }));
    const msg = formatLogPayload(e);
    if (msg) item.appendChild(el('span', { class: 'hyper-log__msg', text: msg }));
    list.appendChild(item);
  }
  section.appendChild(list);
  return section;
}

// Pure: format a log entry's t (ms since epoch) relative to now.
function formatLogTime(ms, now) {
  const diff = (now != null ? now : Date.now()) - ms;
  if (diff < 60_000) return 'just now';
  if (diff < 3_600_000) return `${Math.round(diff / 60_000)}m ago`;
  if (diff < 86_400_000) return `${Math.round(diff / 3_600_000)}h ago`;
  if (diff < 7 * 86_400_000) return `${Math.round(diff / 86_400_000)}d ago`;
  return new Date(ms).toISOString().slice(0, 10);
}

// Pure: render the non-t/type fields of a log entry as "k=v" pairs.
function formatLogPayload(entry) {
  const fields = Object.keys(entry).filter((k) => k !== 't' && k !== 'type');
  if (!fields.length) return '';
  return fields.map((k) => `${k}=${typeof entry[k] === 'string' ? entry[k] : JSON.stringify(entry[k])}`).join(' · ');
}

function cssToken(s) {
  return String(s).toLowerCase().replace(/[^a-z0-9_-]/g, '-');
}

function renderImageList(state) {
  if (!state.images || state.images.length === 0) return null;
  const list = el('section', { class: 'hyper-images' });
  list.appendChild(el('h2', { text: `Containers (${state.images.length})` }));

  // Group by runtime. Show runtime sub-headers only when more than one.
  const byRuntime = new Map();
  for (const img of state.images) {
    const r = img.runtime || '(unknown)';
    if (!byRuntime.has(r)) byRuntime.set(r, []);
    byRuntime.get(r).push(img);
  }
  const showRuntimeHeaders = byRuntime.size > 1;

  for (const [runtime, images] of byRuntime) {
    if (showRuntimeHeaders) {
      list.appendChild(el('h3', { class: 'hyper-images__runtime', text: runtime }));
    }
    for (const img of images) {
      list.appendChild(renderImageRow(decorateImage(img)));
    }
  }
  return list;
}

function renderImageRow(d) {
  const row = el('article', { class: 'hyper-image', data: { image: d.id } });
  const head = el('div', { class: 'hyper-image__head' });
  head.appendChild(el('span', { class: 'hyper-image__name', text: d.name }));
  if (d.isolation) {
    head.appendChild(el('span', {
      class: `hyper-image__iso hyper-image__iso--${d.isolation}`,
      text: d.isolation,
    }));
  }
  if (d.runtime) head.appendChild(el('span', { class: 'hyper-image__runtime', text: d.runtime }));
  row.appendChild(head);

  const meta = el('div', { class: 'hyper-image__meta' });
  if (d.sizeEstimate != null) meta.appendChild(el('span', { text: formatBytes(d.sizeEstimate) }));
  if (d.createdRel) meta.appendChild(el('span', { text: `created ${d.createdRel}` }));
  if (d.scope) meta.appendChild(el('span', { class: 'hyper-image__scope', text: d.scope }));
  row.appendChild(meta);

  const actions = el('div', { class: 'hyper-tool__actions' });
  if (d.scope) actions.appendChild(imageActionButton('Open', 'open-image', d.id));
  actions.appendChild(imageActionButton('Reset', 'reset-image', d.id, 'danger'));
  row.appendChild(actions);

  return row;
}

function imageActionButton(label, action, imageId, variant) {
  return el('button', {
    text: label,
    class: `hyper-btn${variant ? ` hyper-btn--${variant}` : ''}`,
    data: { action, image: imageId },
    attrs: { type: 'button' },
  });
}

function renderUnattributed(unattributed, inspectResult, decoratedUnattributed, maxBytes) {
  const section = el('section', { class: 'hyper-unattributed' });
  section.appendChild(el('h2', { text: 'Unattributed storage' }));
  const ssCount = inspectResult.sessionStorage.length;
  const lines = [
    `${unattributed.cacheNames.length} cache${unattributed.cacheNames.length === 1 ? '' : 's'}`,
    `${unattributed.idbNames.length} IDB`,
    `${unattributed.localStorageKeys.length} LS keys`,
    `${unattributed.swScopes.length} SW`,
  ];
  if (ssCount > 0) lines.push(`${ssCount} SS keys`);
  section.appendChild(el('p', { text: lines.join(' · ') }));

  const bar = renderSizeBar(decoratedUnattributed, maxBytes, {
    computeAction: 'compute-unattributed-cache-sizes',
    targetName: null,
  });
  if (bar) section.appendChild(bar);

  const actions = el('div', { class: 'hyper-tool__actions' });
  actions.appendChild(actionButton('Export', 'export-unattributed'));
  actions.appendChild(actionButton('Reset all', 'reset-unattributed', null, 'danger'));
  section.appendChild(actions);

  section.appendChild(renderToolDetails(buildUnattributedDetails(unattributed, inspectResult)));
  return section;
}

function renderIssues(malformed, logWarnings) {
  const all = [...(malformed || []), ...(logWarnings || [])];
  if (all.length === 0) return null;
  const section = el('section', { class: 'hyper-malformed' });
  section.appendChild(el('h2', { text: 'Issues' }));
  const wrap = el('details');
  wrap.appendChild(el('summary', { text: `${all.length} issue${all.length === 1 ? '' : 's'} detected` }));
  const ul = el('ul');
  for (const m of all) {
    ul.appendChild(el('li', { text: `${m.key}: ${m.reason}` }));
  }
  wrap.appendChild(ul);
  section.appendChild(wrap);
  return section;
}

function renderGlobalActions() {
  const section = el('section', { class: 'hyper-global-actions' });
  section.appendChild(actionButton('Export all', 'export-all'));
  section.appendChild(actionButton('Refresh all', 'refresh-all'));
  section.appendChild(actionButton('Reset everything', 'nuke', null, 'danger'));
  return section;
}

function actionButton(label, action, toolName, variant) {
  const data = { action };
  if (toolName) data.tool = toolName;
  return el('button', {
    text: label,
    class: `hyper-btn${variant ? ` hyper-btn--${variant}` : ''}`,
    data,
    attrs: { type: 'button' },
  });
}

function hasUnattributed(u) {
  return u.cacheNames.length + u.idbNames.length + u.localStorageKeys.length + u.swScopes.length > 0;
}

// Tiny createElement helper — keeps the call sites readable and avoids
// innerHTML entirely (so tool names from localStorage can't inject markup).
function el(tag, opts = {}) {
  const node = document.createElement(tag);
  if (opts.class) node.className = opts.class;
  if (opts.text != null) node.textContent = opts.text;
  if (opts.attrs) for (const [k, v] of Object.entries(opts.attrs)) node.setAttribute(k, v);
  if (opts.data) for (const [k, v] of Object.entries(opts.data)) node.dataset[k] = v;
  return node;
}

// --- Modal dialogs --------------------------------------------------------

// Pure: case-sensitive equality after trimming. Used by confirmWithPhrase and
// callable independently for testing.
function isPhraseAccepted(input, required) {
  return typeof input === 'string' && input.trim() === required;
}

function confirmDialog({ title, body, confirmLabel = 'Confirm', cancelLabel = 'Cancel', danger = false }) {
  return new Promise((resolve) => {
    const dialog = el('dialog', { class: 'hyper-dialog' });
    if (title) dialog.appendChild(el('h2', { class: 'hyper-dialog__title', text: title }));
    if (body) dialog.appendChild(el('p', { class: 'hyper-dialog__body', text: body }));
    const actions = el('div', { class: 'hyper-dialog__actions' });
    const cancel = el('button', { class: 'hyper-btn', text: cancelLabel, attrs: { type: 'button' } });
    const confirm = el('button', {
      class: `hyper-btn${danger ? ' hyper-btn--danger' : ''}`,
      text: confirmLabel,
      attrs: { type: 'button' },
    });
    actions.appendChild(cancel);
    actions.appendChild(confirm);
    dialog.appendChild(actions);

    let result = false;
    cancel.addEventListener('click', () => { result = false; dialog.close(); });
    confirm.addEventListener('click', () => { result = true; dialog.close(); });
    dialog.addEventListener('close', () => { dialog.remove(); resolve(result); });

    document.body.appendChild(dialog);
    dialog.showModal();
    cancel.focus();
  });
}

function messageDialog({ title, body, danger = false, label = 'Close' }) {
  return new Promise((resolve) => {
    const dialog = el('dialog', { class: `hyper-dialog${danger ? ' hyper-dialog--danger' : ''}` });
    if (title) dialog.appendChild(el('h2', { class: 'hyper-dialog__title', text: title }));
    if (body) dialog.appendChild(el('p', { class: 'hyper-dialog__body', text: body }));
    const actions = el('div', { class: 'hyper-dialog__actions' });
    const close = el('button', { class: 'hyper-btn', text: label, attrs: { type: 'button' } });
    actions.appendChild(close);
    dialog.appendChild(actions);
    close.addEventListener('click', () => dialog.close());
    dialog.addEventListener('close', () => { dialog.remove(); resolve(); });
    document.body.appendChild(dialog);
    dialog.showModal();
    close.focus();
  });
}

function confirmWithPhrase({ title, body, phrase, confirmLabel = 'Confirm', cancelLabel = 'Cancel' }) {
  return new Promise((resolve) => {
    const dialog = el('dialog', { class: 'hyper-dialog hyper-dialog--danger' });
    if (title) dialog.appendChild(el('h2', { class: 'hyper-dialog__title', text: title }));
    if (body) dialog.appendChild(el('p', { class: 'hyper-dialog__body', text: body }));
    dialog.appendChild(el('p', { class: 'hyper-dialog__prompt', text: `Type "${phrase}" to confirm:` }));
    const input = el('input', { class: 'hyper-dialog__input', attrs: { type: 'text', autocomplete: 'off' } });
    dialog.appendChild(input);

    const actions = el('div', { class: 'hyper-dialog__actions' });
    const cancel = el('button', { class: 'hyper-btn', text: cancelLabel, attrs: { type: 'button' } });
    const confirm = el('button', {
      class: 'hyper-btn hyper-btn--danger',
      text: confirmLabel,
      attrs: { type: 'button', disabled: '' },
    });
    actions.appendChild(cancel);
    actions.appendChild(confirm);
    dialog.appendChild(actions);

    let result = false;
    const sync = () => {
      if (isPhraseAccepted(input.value, phrase)) confirm.removeAttribute('disabled');
      else confirm.setAttribute('disabled', '');
    };
    input.addEventListener('input', sync);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && isPhraseAccepted(input.value, phrase)) {
        e.preventDefault();
        result = true;
        dialog.close();
      }
    });
    cancel.addEventListener('click', () => { result = false; dialog.close(); });
    confirm.addEventListener('click', () => {
      if (isPhraseAccepted(input.value, phrase)) { result = true; dialog.close(); }
    });
    dialog.addEventListener('close', () => { dialog.remove(); resolve(result); });

    document.body.appendChild(dialog);
    dialog.showModal();
    input.focus();
  });
}

if (typeof module !== 'undefined') {
  module.exports = {
    formatBytes,
    formatLogTime,
    formatLogPayload,
    decorateTool,
    decorateUnattributed,
    decorateImage,
    buildBarSegments,
    buildToolDetails,
    buildUnattributedDetails,
    summaryStats,
    hasUnattributed,
    isPhraseAccepted,
  };
}
